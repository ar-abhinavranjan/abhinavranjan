<head>

    <!-- Open Graph -->

    <meta property="og:title" content="Tech Blogs | Abhinav Ranjan — Cybersecurity & Development">
    <meta property="og:description" content="Explore insights on cybersecurity, ethical hacking, software development, and digital innovation in the official blog of Abhinav Ranjan.">
    <meta property="og:image" content="https://abhinavranjan.netlify.app/images/arlogo.png">

    <!-- Twitter Card -->

    <meta name="twitter:image" content="https://abhinavranjan.netlify.app/images/arlogo.png">

    <!-- JSON-LD Blog Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Blog",
      "name": "Tech Blogs by Abhinav Ranjan",
      "url": "https://abhinavranjan.netlify.app/frontend/blogs/index.html",
      "description": "Cybersecurity, ethical hacking, and web development articles by Abhinav Ranjan.",
      "author": {
        "@type": "Person",
        "name": "Abhinav Ranjan",
        "url": "https://abhinavranjan.netlify.app/"
      }
    }
    </script>
    
    <link rel="icon" type="image/png" href="../../images/arlogo.png">
    <link rel="apple-touch-icon" href="../../images/arlogo.png">
    <link rel="manifest" href="../../manifest.json">
    <meta name="theme-color" content="#6366f1">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #6366f1;
            --accent: #8b5cf6;
            --bg: #05050f;
            --card-bg: rgba(18, 18, 30, 0.85);
            --text: #fff;
            --text-muted: rgba(255, 255, 255, 0.6);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* Background effects */
        .bg-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(139, 92, 246, 0.1) 0%, transparent 40%);
            z-index: -1; pointer-events: none;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; }

        /* Navigation */
        .nav {
            padding: 1.5rem 0; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo { display: flex; align-items: center; gap: 0.8rem; text-decoration: none; color: #fff; }
        .logo-box { background: var(--primary); padding: 0.4rem 0.6rem; border-radius: 8px; font-weight: 800; font-size: 0.9rem; }
        .back-link { text-decoration: none; color: var(--text-muted); font-size: 0.9rem; transition: color 0.3s; }
        .back-link:hover { color: #fff; }

        /* Header */
        .header { padding: 5rem 0 3rem; text-align: center; }
        .header h1 { font-size: clamp(2.5rem, 5vw, 4rem); font-weight: 800; margin-bottom: 1rem; background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
        .header p { font-size: 1.2rem; color: var(--text-muted); max-width: 600px; margin: 0 auto; }

        /* Listing Controls */
        .controls { display: flex; flex-direction: column; gap: 2rem; margin-bottom: 4rem; }
        .search-bar { position: relative; max-width: 500px; margin: 0 auto; width: 100%; }
        .search-bar input { width: 100%; padding: 1.2rem 1.5rem 1.2rem 3.5rem; background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; color: #fff; font-family: inherit; font-size: 1rem; outline: none; transition: border-color 0.3s; }
        .search-bar i { position: absolute; left: 1.5rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .search-bar input:focus { border-color: var(--primary); }

        .filters { display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap; }
        .filter-btn { padding: 0.6rem 1.4rem; border-radius: 50px; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border); color: var(--text-muted); font-family: inherit; font-size: 0.9rem; cursor: pointer; transition: all 0.3s; }
        .filter-btn:hover, .filter-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

        /* Blog Grid */
        .blog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 2.5rem; margin-bottom: 5rem; }
        .blog-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; text-decoration: none; color: inherit; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .blog-card:hover { transform: translateY(-10px); border-color: rgba(99, 102, 241, 0.5); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4); }
        .blog-card-img { width: 100%; height: 220px; overflow: hidden; position: relative; }
        .blog-card-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
        .blog-card:hover .blog-card-img img { transform: scale(1.1); }
        .blog-category { position: absolute; top: 1.2rem; right: 1.2rem; padding: 0.4rem 0.8rem; background: var(--primary); border-radius: 8px; font-size: 0.75rem; font-weight: 700; }
        
        .blog-card-content { padding: 1.5rem; }
        .blog-date { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.8rem; display: block; }
        .blog-card-content h3 { font-size: 1.4rem; font-weight: 700; margin-bottom: 1rem; line-height: 1.4; color: #fff; }
        .blog-card-content p { font-size: 0.95rem; color: var(--text-muted); line-height: 1.6; margin-bottom: 1.5rem; display: -webkit-box; -webkit-line-clamp: 3; line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .blog-card-footer { color: var(--primary); font-weight: 600; font-size: 0.9rem; display: flex; align-items: center; gap: 0.5rem; }

        /* Loader */
        #loader-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #05050f; z-index: 9999; display: flex; justify-content: center; align-items: center; transition: opacity 0.5s; }
        .loader-spinner { width: 50px; height: 50px; border: 3px solid rgba(99, 102, 241, 0.1); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s infinite linear; }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .blog-grid { grid-template-columns: 1fr; }
            .header { padding: 3rem 0; }
        }
    </style>
</head>

<body>
    <div id="loader-wrapper">
        <div class="loader-spinner"></div>
    </div>

    <div class="bg-glow"></div>

    <div class="container">
        <nav class="nav">
            <a href="/" class="logo" aria-label="AR. Abhinav Ranjan Home">
                AR<span class="dot">.</span>
                <span style="font-weight: 700; letter-spacing: 1px; margin-left: 0.5rem; color: var(--primary);">BLOGS</span>
            </a>
            <div style="display: flex; gap: 1.5rem; align-items: center;">
                <a href="https://www.blogger.com/profile/YOUR_ID" target="_blank" class="back-link" style="color: var(--primary); font-weight: 600;">
                    <i class="fab fa-blogger"></i> Blogger Profile
                </a>
                <a href="../../index.html" class="back-link">
                    <i class="fas fa-arrow-left"></i> AR. Index
                </a>
            </div>
        </nav>

        <header class="header">
            <h1>Tech Stories</h1>
            <p>Thoughtful discussions on cybersecurity, system design, and technology ventures by Abhinav Ranjan.</p>
        </header>

        <section class="controls">
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" id="blogSearch" placeholder="Search by topic or keyword...">
            </div>
            <div class="filters">
                <button class="filter-btn active" data-category="all">All Entries</button>
                <button class="filter-btn" data-category="Technology">Technology</button>
                <button class="filter-btn" data-category="Innovation">Innovation</button>
                <button class="filter-btn" data-category="Business">Business</button>
            </div>
        </section>

        <div class="blog-grid" id="blogGrid">
            <!-- Dynamically populated -->
        </div>
    </div>

    <script src="/frontend/logic/blog_library.js"></script>
    <script>
        window.addEventListener('load', () => {
            const loader = document.getElementById('loader-wrapper');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
            }
        });
    </script>
</body>
</html>
