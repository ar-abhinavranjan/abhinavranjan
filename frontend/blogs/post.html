<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR.TECH| Blog Post</title>
    <link rel="icon" type="image/png" href="/images/arlogo.png">
    <meta name="description" content="Read the latest tech insights and stories by Abhinav Ranjan.">
    <link rel="canonical" id="canonicalTag" href="">

    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="article">
    <meta property="og:title" content="Blog Post | Abhinav Ranjan">
    <meta property="og:description" content="Technology and innovation insights.">
    <meta property="og:image" content="../../images/arlogo.png">
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Blog Post | Abhinav Ranjan">
    <meta name="twitter:description" content="Technology and innovation insights.">
    <meta name="twitter:image" content="../../images/arlogo.png">

    <link rel="icon" type="image/png" href="../../images/arlogo.png">
    <link rel="apple-touch-icon" href="../../images/arlogo.png">
    <link rel="manifest" href="../../manifest.json">
    <meta name="theme-color" content="#6366f1">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #6366f1;
            --accent: #8b5cf6;
            --bg: #05050f;
            --card-bg: rgba(18, 18, 30, 0.85);
            --text: #fff;
            --text-muted: rgba(255, 255, 255, 0.6);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; line-height: 1.6; }

        .container { max-width: 900px; margin: 0 auto; padding: 0 2rem; }

        /* Navigation */
        .nav { padding: 1.5rem 0; display: flex; justify-content: space-between; align-items: center; }
        .back-link { text-decoration: none; color: var(--text-muted); font-size: 0.9rem; transition: color 0.3s; }
        .back-link:hover { color: #fff; }

        /* Hero */
        .post-hero {
            height: 400px; width: 100%; position: relative;
            background-size: cover; background-position: center; border-radius: 20px;
            margin-bottom: 3rem; overflow: hidden;
            display: flex; align-items: flex-end; padding: 2rem;
            box-shadow: inset 0 -200px 100px -50px rgba(5, 5, 15, 0.9);
        }
        .hero-meta { position: relative; z-index: 2; }
        .post-header { margin-bottom: 2rem; }
        .post-header h1 { font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 800; margin-bottom: 1rem; color: #fff; line-height: 1.2; }
        .post-info { display: flex; gap: 1.5rem; color: var(--text-muted); font-size: 0.9rem; flex-wrap: wrap; }
        .post-info span { display: flex; align-items: center; gap: 0.5rem; }

        /* Content */
        .post-body { font-size: 1.15rem; color: rgba(255, 255, 255, 0.85); margin-bottom: 5rem; }
        .post-body h2 { font-size: 2rem; color: #fff; margin: 3rem 0 1.5rem; font-weight: 700; }
        .post-body p { margin-bottom: 1.5rem; }
        .post-body strong { color: #fff; font-weight: 600; }
        .post-body i { color: var(--primary); margin-right: 0.5rem; }

        /* Sample styles for dynamic content */
        .post-body img { width: 100%; border-radius: 12px; margin: 2rem 0; border: 1px solid var(--border); }
        .post-body blockquote { border-left: 4px solid var(--primary); padding: 1.5rem 2rem; background: rgba(99, 102, 241, 0.05); margin: 2.5rem 0; font-size: 1.3rem; font-style: italic; color: #fff; border-radius: 0 12px 12px 0; }

        @media (max-width: 768px) {
            .post-hero { height: 300px; padding: 1.5rem; }
            .post-body { font-size: 1.05rem; }
        }
    </style>
</head>

<body>
    <div class="container">
        <nav class="nav">
            <a href="index.html" class="back-link">
                <i class="fas fa-arrow-left"></i> Back to Blogs
            </a>
            <a href="/" class="logo" aria-label="AR. Abhinav Ranjan Home">
                AR<span class="dot">.</span>
            </a>
        </nav>

        <header class="post-header">
            <div class="post-hero" id="postHero">
                <div class="hero-meta">
                    <h1 id="postTitle">Loading Post...</h1>
                    <div class="post-info">
                        <span id="postDate"><i class="fas fa-calendar"></i> --</span>
                        <span id="postAuthor"><i class="fas fa-user"></i> --</span>
                    </div>
                </div>
            </div>
        </header>

        <article class="post-body" id="postBody">
            <!-- Content dynamically fetched -->
            <div style="padding: 5rem 0; text-align: center; color: var(--text-muted);">
                <i class="fas fa-circle-notch fa-spin fa-2x"></i>
                <p style="margin-top: 1rem;">Fetching story insights...</p>
            </div>
        </article>
    </div>

    <script src="/frontend/logic/blog_library.js"></script>
</body>

</html>
