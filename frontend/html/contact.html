                <div class="contact-wrapper fade-in-up delay-200">
                    <form class="contact-form" id="contactForm">
                        <div class="form-group">
                            <label for="name">Name</label>
                            <input type="text" id="name" name="name" placeholder="Your Name" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" placeholder="your@email.com" required>
                        </div>
                        <div class="form-group">
                            <label for="message">Message</label>
                            <textarea id="message" name="message" rows="5" placeholder="Tell him about your project..."
                                required></textarea>
                        </div>
                        <div class="form-actions" style="display: flex; flex-direction: column; gap: 1rem;">
                            <button type="button" id="sendWhatsapp" class="btn btn-primary btn-block">
                                <i class="fab fa-whatsapp"></i> Send via WhatsApp - Fast
                            </button>
                            <button type="button" id="sendEmail" class="btn btn-secondary btn-block">
                                <i class="fas fa-envelope"></i> Send via Email - Slow
                            </button>
                            <button type="button" id="sendTelegram" class="btn btn-secondary btn-block">
                                <i class="fab fa-telegram"></i> Send via Telegram - Fast
                            </button>
                            <button type="button" id="sendWeb" class="btn btn-secondary btn-block">
                                <i class="fas fa-globe"></i> Send via Web - Slow
                            </button>
