# netlify.toml — Netlify configuration for abhinavranjan portfolio

[build]
  # Root of the published static site
  publish = "."
  # Location of serverless functions
  functions = "netlify/functions"

# Route /api/* → /.netlify/functions/* so the client can call /api/saveContact
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/:splat"
  status = 200
  force  = true

# Security Headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' www.googletagmanager.com 'unsafe-inline'; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src fonts.gstatic.com cdnjs.cloudflare.com; img-src 'self' data: https:; connect-src 'self' www.googletagmanager.com api.github.com; frame-ancestors 'none';"

# CORS for API endpoints
[[headers]]
  for = "/api/saveContact"
  [headers.values]
    Access-Control-Allow-Origin = "https://abhinavranjan.qzz.io"
    Access-Control-Allow-Methods = "POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, X-CSRF-Token, X-Requested-With"
    Access-Control-Max-Age = "7200"

# Cache control for static assets
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/frontend/css/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/frontend/logic/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Prevent the catch-all 404 in _redirects from swallowing API calls
# (Netlify evaluates netlify.toml redirects before _redirects)
